---
applications:
- name: capire-ord-sample
  memory: 512M
  disk_quota: 1G
  buildpacks:
    - nodejs_buildpack
  command: npx cds-serve
  routes:
    - route: capire-ord-sample-${random-word}.cfapps.<region>.hana.ondemand.com
  env:
    # --- OTel exporter selection -------------------------------------------
    # Pick ONE of the three blocks below.

    # 1) Console (default, no extra service binding needed) — safest first run.
    CDS_REQUIRES_TELEMETRY_KIND: telemetry-to-console

    # 2) SAP Cloud Logging — uncomment + bind a cloud-logging service instance
    #    cf bind-service capire-ord-sample <my-cloud-logging-instance>
    # CDS_REQUIRES_TELEMETRY_KIND: telemetry-to-cloud-logging

    # 3) Dynatrace — uncomment + bind a dynatrace managed service instance
    #    cf bind-service capire-ord-sample <my-dynatrace-instance>
    # CDS_REQUIRES_TELEMETRY_KIND: telemetry-to-dynatrace

    # --- Plain log level (optional) ----------------------------------------
    DEBUG: "telemetry"
  # services:
  #   - my-cloud-logging-instance
  #   - my-dynatrace-instance
